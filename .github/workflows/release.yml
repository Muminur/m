name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (arm64) — macos-14+ runners are ARM by default
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          # Windows x86_64
          - platform: windows-latest
            args: ''
            rust_target: ''
          # macOS Intel (x86_64) — add back when macos-13 runners are available on this plan
          # - platform: macos-13
          #   args: '--target x86_64-apple-darwin'
          #   rust_target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.rust_target }}-cargo-clangrt2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rust_target }}-cargo-clangrt2-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Link Clang runtime (macOS only)
        if: runner.os == 'macOS'
        run: |
          # ggml-metal uses @available(macOS 15.0,*) for Metal residency sets.
          # At any MACOSX_DEPLOYMENT_TARGET < 15.0, clang emits ___isPlatformVersionAtLeast
          # which lives in libclang_rt.osx.a. Rust's linker uses -nodefaultlibs so the
          # clang driver's runtime lib search path isn't added automatically.
          # We resolve the path with `clang -print-runtime-dir` and pass it explicitly.
          CLANG_RT_DIR=$(xcrun clang -print-runtime-dir)
          echo "RUSTFLAGS=-C link-arg=-L${CLANG_RT_DIR} -C link-arg=-lclang_rt.osx" >> $GITHUB_ENV

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS deployment target — sets minimum SDK floor; matches tauri.conf.json minimumSystemVersion
          MACOSX_DEPLOYMENT_TARGET: '14.0'
          # Tauri updater artifact signing (all platforms)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing — add these secrets when an Apple Developer account is available:
          # APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY
          # APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "WhisperDesk ${{ github.ref_name }}"
          releaseBody: |
            ## WhisperDesk ${{ github.ref_name }}

            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for details.

            ### Downloads
            - **macOS Apple Silicon**: `WhisperDesk_*_aarch64.dmg`
            - **macOS Intel**: `WhisperDesk_*_x64.dmg`
            - **Windows**: `WhisperDesk_*_x64-setup.exe`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # tauri-action v0 consumes .sig files for its internal updater JSON (Tauri v1
      # behaviour). Re-sign the bundle here so the Tauri v2 Cloudflare worker can
      # fetch the standalone signature.
      - name: Sign and upload updater bundle (macOS)
        if: runner.os == 'macOS'
        run: |
          BUNDLE="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/WhisperDesk.app.tar.gz"
          if [ -f "$BUNDLE" ]; then
            npx tauri signer sign "$BUNDLE" --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            gh release upload "${{ github.ref_name }}" "${BUNDLE}.sig" --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Sign and upload updater bundle (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # The Tauri v2 updater needs the .nsis.zip bundle + .nsis.zip.sig signature.
          # tauri-action only uploads the .exe; upload the zip and re-sign here.
          NSIS_ZIP=$(ls src-tauri/target/release/bundle/nsis/*.nsis.zip 2>/dev/null | head -1)
          if [ -n "$NSIS_ZIP" ]; then
            npx tauri signer sign "$NSIS_ZIP" --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            gh release upload "${{ github.ref_name }}" "$NSIS_ZIP" --clobber
            gh release upload "${{ github.ref_name }}" "${NSIS_ZIP}.sig" --clobber
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  publish:
    needs: release
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        run: gh release edit "${{ github.ref_name }}" --draft=false --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
