name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (arm64) — macos-14+ runners are ARM by default
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          # Windows x86_64
          - platform: windows-latest
            args: ''
            rust_target: ''
          # macOS Intel (x86_64) — add back when macos-13 runners are available on this plan
          # - platform: macos-13
          #   args: '--target x86_64-apple-darwin'
          #   rust_target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.rust_target }}-cargo-clangrt-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rust_target }}-cargo-clangrt-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Link Clang runtime (macOS only)
        if: runner.os == 'macOS'
        run: |
          # ggml-metal uses @available(macOS 15.0,*) for Metal residency sets.
          # When MACOSX_DEPLOYMENT_TARGET < 15.0 clang emits ___isPlatformVersionAtLeast
          # which lives in libclang_rt.osx.a — not auto-linked by Rust's linker.
          # Passing -lclang_rt.osx lets the clang driver find it in its own lib path.
          echo "RUSTFLAGS=-C link-arg=-lclang_rt.osx" >> $GITHUB_ENV

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS deployment target — sets minimum SDK floor; matches tauri.conf.json minimumSystemVersion
          MACOSX_DEPLOYMENT_TARGET: '14.0'
          # macOS code signing — Developer ID Application certificate
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # macOS notarization — Apple ID method
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater artifact signing (all platforms)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'WhisperDesk ${{ github.ref_name }}'
          releaseBody: |
            ## WhisperDesk ${{ github.ref_name }}

            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for details.

            ### Downloads
            - **macOS Apple Silicon**: `WhisperDesk_*_aarch64.dmg`
            - **macOS Intel**: `WhisperDesk_*_x64.dmg`
            - **Windows**: `WhisperDesk_*_x64-setup.exe`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
