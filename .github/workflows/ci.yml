name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy (with disallowed-methods enforcement)
        working-directory: src-tauri
        run: cargo clippy --all-features -- -D warnings

      - name: Run Rust unit tests
        working-directory: src-tauri
        run: cargo test --lib -- --test-threads=4

      - name: Run Rust integration tests
        working-directory: src-tauri
        run: cargo test --test '*' -- --test-threads=2
        continue-on-error: true  # Integration tests may require keychain access on CI

  frontend-checks:
    name: Frontend Checks
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run Vitest unit tests
        run: npx vitest run --reporter=verbose

      - name: Lint
        run: npx eslint . --max-warnings 0
        continue-on-error: true  # Lint warnings don't block CI in M1

  build:
    name: Build macOS App
    runs-on: macos-latest
    needs: [rust-checks, frontend-checks]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --bundles none
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

  e2e:
    name: E2E Tests
    runs-on: macos-latest
    needs: [build]
    if: false  # Disabled until M2 produces a runnable binary
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        run: npx playwright test e2e/specs/m1-foundation.spec.ts
